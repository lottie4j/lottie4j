# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven

      - name: Run the tests
        run: mvn -ntp -B test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven

      - name: Build with Maven
        run: mvn -ntp -B -Dmaven.test.skip=true -B package

      - uses: actions/upload-artifact@v4
        with:
          name: lottie4j
          retention-days: 30
          path: |
            core/target/*.jar
            fxdemo/target/*.jar
            fxfileviewer/target/*.jar
            fxplayer/target/*.jar

  deploy-snapshot:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets are available
        run: |
          if [ -z "${{ secrets.OSSRH_USERNAME }}" ]; then
            echo "ERROR: OSSRH_USERNAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.OSSRH_TOKEN }}" ]; then
            echo "ERROR: OSSRH_TOKEN secret is not set"
            exit 1
          fi
          echo "✅ Both OSSRH_USERNAME and OSSRH_TOKEN secrets are available"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Deploy SNAPSHOT to OSSRH
        run: mvn -Psnapshot -ntp -B deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
