name: Release to Maven Central

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  release:
    if: github.event.label.name == 'approved-for-release'
    runs-on: ubuntu-latest

    steps:
      - name: Parse release version from issue
        id: parse
        run: |
          VERSION=$(echo "${{ github.event.issue.title }}" | grep -oP 'Release version \K[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from issue title. Expected format: 'Release version X.Y.Z'"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed version: $VERSION"

      - name: Comment on issue - Starting release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Starting release process for version ${{ steps.parse.outputs.version }}...'
            })

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Update version in POM
        run: |
          mvn versions:set -DnewVersion=${{ steps.parse.outputs.version }} -DgenerateBackupPoms=false

      - name: Build and stage artifacts
        run: |
          mvn -Prelease clean deploy -DaltDeploymentRepository=local::file:./target/staging-deploy
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run JReleaser
        run: |
          mvn -Prelease jreleaser:deploy -Djreleaser.dry.run=false
        env:
          JRELEASER_NEXUS2_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          JRELEASER_NEXUS2_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Git tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ steps.parse.outputs.version }} -m "Release version ${{ steps.parse.outputs.version }}"
          git push origin v${{ steps.parse.outputs.version }}

      - name: Comment on issue - Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Release ${{ steps.parse.outputs.version }} completed successfully!\n\nArtifacts published:\n- `com.lottie4j:core:${{ steps.parse.outputs.version }}`\n- `com.lottie4j:fxplayer:${{ steps.parse.outputs.version }}`'
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              labels: ['approved-for-release', 'released']
            })

      - name: Comment on issue - Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Release ${{ steps.parse.outputs.version }} failed. Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })
