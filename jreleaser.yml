project:
  name: lottie4j
  description: Java library for parsing and rendering Lottie animations
  longDescription: Lottie4J is a Java library that provides parsing and rendering capabilities for Lottie animations
  website: https://github.com/FrankDupree/lottie4j
  authors:
    - Frank Delporte
  license: GNU v2
  inceptionYear: 2026
  java:
    groupId: com.lottie4j
    version: 21
    multiProject: true

release:
  github:
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'

signing:
  active: ALWAYS
  armored: true

deploy:
  maven:
    nexus2:
      maven-central:
        active: ALWAYS
        url: https://s01.oss.sonatype.org/service/local
        closeRepository: true
        releaseRepository: true
        stagingRepositories:
          - target/staging-deploy

distributions:
  lottie4j:
    artifacts:
      - path: core/target/core-{{projectVersion}}.jar
      - path: core/target/core-{{projectVersion}}-sources.jar
      - path: core/target/core-{{projectVersion}}-javadoc.jar
      - path: fxplayer/target/fxplayer-{{projectVersion}}.jar
      - path: fxplayer/target/fxplayer-{{projectVersion}}-sources.jar
      - path: fxplayer/target/fxplayer-{{projectVersion}}-javadoc.jar
